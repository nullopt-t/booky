<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email</title>
</head>

<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,Helvetica,sans-serif;">

    <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
        style="background-color:#f4f4f4;padding:40px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0"
                    style="background:#ffffff;border-radius:8px;padding:40px;">
                    <tr>
                        <td align="center">
                            <h2 style="margin:0;color:#333333;">
                                Verify Your Email
                            </h2>

                            <p style="margin:24px 0;color:#666666;font-size:16px;line-height:1.5;">
                                Use the verification code below to continue.
                            </p>

                            <div style="
                                display:inline-block;
                                padding:16px 32px;
                                background:#f2f2f2;
                                border:1px dashed #cccccc;
                                border-radius:8px;
                                font-size:32px;
                                font-weight:bold;
                                letter-spacing:8px;
                                color:#222222;
                            ">
                                {{ .Code }}
                            </div>

                            <p style="margin-top:20px;color:#999999;font-size:13px;line-height:1.6;">
                                If you didn't request this code, you can safely ignore this email.
                            </p>

                            <hr style="margin:40px 0;border:none;border-top:1px solid #eeeeee;">

                            <p style="font-size:12px;color:#999999;">
                                Booky Team
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

</body>

</html>
