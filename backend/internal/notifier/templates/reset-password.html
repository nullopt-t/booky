<!doctype html>
<html>

<body style="font-family: Arial, sans-serif; background:#f6f6f6; padding:20px;">

    <div style="max-width:600px; margin:0 auto; background:#fff; padding:20px; border-radius:8px;">

        <h2 style="color:#333;">Reset your password</h2>

        <p>
            We got a request to reset your password. If this was you, click the button below.
        </p>

        <p style="text-align:center; margin:30px 0;">
            <a href="{{.BaseURL}}/reset-password?token={{.Token}}" style="background:#2563eb; color:#fff; padding:12px 20px;
                  text-decoration:none; border-radius:6px; display:inline-block;">
                Reset Password
            </a>
        </p>

        <p>
            If you didn’t request this, just ignore this email. No changes will be made.
        </p>

        <hr style="margin:30px 0; border:none; border-top:1px solid #eee;">

        <p style="font-size:12px; color:#888;">
            This link will expire in 15–60 minutes for security reasons.
        </p>

    </div>

</body>

</html>
